name: Upstream Drift

on:
  schedule:
    - cron: "17 12 * * 1"
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install jsonschema

      - name: Update submodule to latest upstream
        run: git submodule update --remote

      - name: Refresh live sources and rebuild
        run: |
          bash scripts/update-all.sh
          python3 scripts/lint_openapi.py

      - name: Assert native spec has no generic placeholder operations
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/validation-report.json").read_text())
          count = report["native_generic_operation_count"]
          operations = report["native_generic_operations"]
          if count != 0:
              raise SystemExit(
                  f"native_generic_operation_count={count}, operations={operations}"
              )
          print("native_generic_operation_count=0")
          PY

      - name: Assert compat spec has no generic placeholder operations
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("reports/openai-compat-validation-report.json").read_text())
          count = report["compat_generic_operation_count"]
          operations = report["compat_generic_operations"]
          if count != 0:
              raise SystemExit(
                  f"compat_generic_operation_count={count}, operations={operations}"
              )
          print("compat_generic_operation_count=0")
          PY

      - name: Show drift summary
        run: cat reports/drift-summary.md

      - name: Upload drift summary artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: upstream-drift-reports-${{ github.run_id }}
          path: |
            reports/drift-summary.md
            reports/drift-summary.json
            reports/compat-watchlist.md
          if-no-files-found: error

      - name: Commit and push upstream sync
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No upstream drift detected."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add sources/ reports/ openapi/ reference/
            git commit -m "chore: sync upstream sources and rebuild specs [skip ci]"
            git push
          fi
